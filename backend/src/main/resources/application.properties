# Server Configuration
server.port=5000
spring.application.name=badya-university-event-booking

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:badyaunievents
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging
logging.level.com.badyauniversity=DEBUG
logging.level.org.springframework.web=INFO

# Initial admin (created only when no admins exist — change email/password before first run in production)
app.admin.name=Super Admin
app.admin.email=admin@badyauniversity.com
app.admin.password=admin123

