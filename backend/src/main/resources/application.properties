# Server Configuration
server.port=5000
spring.application.name=badya-university-event-booking

# Database Configuration (Switching to MySQL as default)
spring.datasource.url=jdbc:mysql://localhost:3306/badyaunievents?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for quick debugging if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Static Content
spring.web.resources.static-locations=file:uploads/

# Site settings
app.site.base-url=http://localhost:5000

# CORS (Allow all for development)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging
logging.level.com.badyauniversity=DEBUG
logging.level.org.springframework.web=INFO

# Initial admin
app.admin.name=Admin
app.admin.email=admin@gmail.com
app.admin.password=0000

# Attendance Settings
app.attendance.tokenPepper=badya-secret-pepper-2026
app.attendance.tokenTtlMinutes=15
